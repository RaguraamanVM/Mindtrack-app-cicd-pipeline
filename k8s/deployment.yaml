apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindtrack-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindtrack-app
  template:
    metadata:
      labels:
        app: mindtrack-app
    spec:
      containers:
      - name: brain-tasks-app
        image: raguraaman/mindtrack-app:v1
        ports:
        - containerPort: 80
